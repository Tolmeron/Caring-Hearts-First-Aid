  .topbar{background:var(--forest-deep);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20;}
  .brand{font-family:var(--display);font-weight:600;font-size:17px;}
  .brand small{display:block;font-family:var(--mono);font-size:10px;font-weight:400;letter-spacing:1px;text-transform:uppercase;color:#9FB3AB;margin-top:2px;}

  .progress-step{flex:1;height:5px;border-radius:3px;background:#3A544C;}
  .progress-step.done{background:var(--success);}
  .progress-step.active{background:var(--amber);}
  .main{flex:1;padding:36px 20px 100px;}
  .wrap{max-width:680px;margin:0 auto;}
  .eyebrow{font-family:var(--mono);text-transform:uppercase;letter-spacing:2px;font-size:11px;color:var(--amber);margin-bottom:10px;}
  h1{font-family:var(--display);font-size:30px;font-weight:600;color:var(--forest-deep);margin:0 0 10px;line-height:1.2;}
  h1.landing{font-size:38px;}
  p.lead{font-size:15px;line-height:1.7;color:var(--ink-soft);margin:0 0 26px;}
  .card{background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:20px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
  .field .hint{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .field input[type=text],.field input[type=email],.field input[type=tel],.field input[type=date],.field input[type=number],.field select,.field textarea{
    width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid var(--line);font-size:14.5px;font-family:var(--body);background:#fff;
  }
  .field textarea{resize:vertical;min-height:60px;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--forest);outline-offset:1px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  @media (max-width:600px){.row2,.row3{grid-template-columns:1fr;}}
  .radio-group,.check-group{display:flex;flex-wrap:wrap;gap:10px;}
  .radio-opt,.check-opt{display:flex;align-items:center;gap:7px;padding:9px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:13.5px;background:#fff;cursor:pointer;}
  .radio-opt input,.check-opt input{accent-color:var(--forest);width:15px;height:15px;}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--forest);color:#fff;border:none;border-radius:10px;padding:13px 22px;font-size:14.5px;font-weight:600;}
  .btn:hover{background:var(--forest-deep);}
  .btn.secondary{background:transparent;color:var(--forest);border:1.5px solid var(--forest);}
  .btn.secondary:hover{background:var(--forest);color:#fff;}
  .btn:disabled{opacity:0.45;cursor:not-allowed;}
  .nav-row{display:flex;justify-content:space-between;margin-top:26px;}
  .section-title{font-family:var(--display);font-size:19px;font-weight:600;color:var(--forest-deep);margin:0 0 4px;}
  .section-sub{font-size:13px;color:var(--ink-soft);margin:0 0 18px;}
  .doc-list{list-style:none;padding:0;margin:0;}
  .doc-list li{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .doc-list li:last-child{border-bottom:none;}
  .doc-list .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0;}
  .callout{background:var(--success-soft);border-left:4px solid var(--success);border-radius:0 10px 10px 0;padding:14px 16px;margin:16px 0;font-size:13.5px;line-height:1.6;}

  .status-line{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:13.5px;}
  .status-line .spin{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--forest);animation:spin 0.8s linear infinite;flex-shrink:0;}

  .status-line.done{color:var(--success);}
  .status-line .icon{width:14px;text-align:center;flex-shrink:0;}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;}}

/* =========================================================================
   DERIVED / COMPUTED FIELDS
   Some PDF fields aren't raw form inputs \u2014 they're computed from other
   answers (full name, checkbox marks, constants, etc). This runs right
   before filling.
========================================================================= */
function computeDerived(data){
  const d = {...data};
  d.fullName = [d.firstName,d.middleName,d.lastName].filter(Boolean).join(" ");
  d.firstAndMiddleForW4 = [d.firstName,d.middleName].filter(Boolean).join(" ");
  d.cityStateZip = [d.city, d.state, d.zip].filter(Boolean).join(", ");
  d.fullAddress = [d.street, d.apt ? "Apt "+d.apt : "", d.cityStateZip].filter(Boolean).join(", ");

  d.orgNameConst = CONFIG.orgName;
  d.arbitrationCountyConst = CONFIG.arbitrationCounty;
  d.arbitrationStateConst = CONFIG.arbitrationState;

  d.contractDay = ""; d.contractMonth = ""; d.contractYear = ""; // left blank \u2014 filled in at signing

  d.w4FilingSingle = d.filingStatus === "Single or Married filing separately" ? mark() : "";
  d.w4FilingJoint = d.filingStatus === "Married filing jointly or Qualifying surviving spouse" ? mark() : "";
  d.w4FilingHOH = d.filingStatus === "Head of household" ? mark() : "";
  d.multipleJobsBoxMark = d.multipleJobsBox ? mark() : "";
  d.w4ExemptMark = d.w4Exempt ? mark() : "";
  d.dependentsUnder17Amt = d.dependentsUnder17 ? (Number(d.dependentsUnder17)*2200).toLocaleString() : "";
  d.otherDependentsAmt = d.otherDependents ? (Number(d.otherDependents)*500).toLocaleString() : "";
  const step3total = (Number(d.dependentsUnder17||0)*2200) + (Number(d.otherDependents||0)*500);
  d.w4Step3Total = step3total ? step3total.toLocaleString() : "";

  d.i9Status1Mark = d.citizenshipStatus === "A citizen of the United States" ? mark() : "";
  d.i9Status2Mark = d.citizenshipStatus === "A noncitizen national of the United States" ? mark() : "";
  d.i9Status3Mark = d.citizenshipStatus === "A lawful permanent resident" ? mark() : "";
  d.i9Status4Mark = d.citizenshipStatus === "An alien authorized to work until a specific date" ? mark() : "";

  d.medicalConsentYesMark = d.medicalNoticeElectronic === "Yes, electronically" ? mark() : "";
  d.medicalConsentNoMark = d.medicalNoticeElectronic === "No, paper copy" ? mark() : "";

  return d;
}

/* =========================================================================
   STATE
========================================================================= */
let formData = {};
let currentStep = -1; // -1 = landing, STEPS.length = review, STEPS.length+1 = generating/done
let fillStatuses = {}; // docId -> "pending"|"working"|"done"|"error"

/* =========================================================================
   RENDER HELPERS
========================================================================= */
const app = document.getElementById("app");
function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for(const k in attrs){
    if(k==="class") e.className = attrs[k];
    else if(k==="html") e.innerHTML = attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    e.appendChild(typeof c==="string" ? document.createTextNode(c) : c);
  });
  return e;
}

function topBar(){
  const totalSteps = STEPS.length + 1; // +1 for review
  const bar = el("div",{class:"topbar"},[
    el("div",{class:"brand"},[document.createTextNode(CONFIG.orgName), el("small",{},"New Hire Paperwork")]),
  ]);
  if(currentStep >= 0 && currentStep <= STEPS.length){
    const pw = el("div",{class:"progress-wrap"});
    for(let i=0;i<totalSteps;i++){
      const cls = i<currentStep?"done":(i===currentStep?"active":"");
      pw.appendChild(el("div",{class:"progress-step "+cls}));
    }
    bar.appendChild(pw);
  }
  return bar;
}

/* ---------- Landing ---------- */
function renderLanding(container){
  const wrap = el("div",{class:"wrap"});
  wrap.appendChild(el("div",{class:"eyebrow"},"Caregiver Onboarding"));
  wrap.appendChild(el("h1",{class:"landing"},"Let's get your paperwork done."));
  wrap.appendChild(el("p",{class:"lead"},"Answer a set of questions once, and we'll fill in your name, address, and other details across all your new-hire forms automatically. At the end you'll download everything, ready to review and sign."));

  const card = el("div",{class:"card"});
  card.appendChild(el("div",{class:"section-title"},"What you'll be filling out"));
  const list = el("ul",{class:"doc-list"});
  DOCS.filter(d=>d.overlays.length>0).forEach(d=>{
    list.appendChild(el("li",{},[el("span",{class:"dot"}), document.createTextNode(d.label)]));
  });
  card.appendChild(list);
  wrap.appendChild(card);

  wrap.appendChild(el("div",{class:"callout warn"},"Every signature line and \u201cdate signed\u201d line is left blank on purpose \u2014 you'll sign those yourself (on paper or through a separate e-sign step), since that's a distinct legal moment from filling in your info."));

  wrap.appendChild(el("button",{class:"btn", onclick:()=>{ currentStep=0; render(); window.scrollTo(0,0); }},"Get Started \u2192"));
  container.appendChild(wrap);
}

/* ---------- Step form ---------- */
function renderStep(container){
  const step = STEPS[currentStep];
  const wrap = el("div",{class:"wrap"});
  wrap.appendChild(el("div",{class:"eyebrow"}, "Step "+(currentStep+1)+" of "+(STEPS.length+1)));
  wrap.appendChild(el("h1",{}, step.title));
  if(step.sub) wrap.appendChild(el("p",{class:"lead"}, step.sub));

  const card = el("div",{class:"card"});
  // group fields into rows based on their `w` (out of 3 columns)
  let i=0;
  while(i<step.fields.length){
    const f = step.fields[i];
    if(f.w===3 || f.type==="textarea"){
      card.appendChild(renderField(f));
      i++;
    } else if(f.w===2){
      const row = el("div",{class:"row2"},[renderFieldInner(f)]);
      i++;
      if(step.fields[i] && step.fields[i].w===1){ row.appendChild(renderFieldInner(step.fields[i])); i++; }
      card.appendChild(wrapRow(row));
    } else {
      // collect up to 3 consecutive w:1 fields
      const group = [f]; i++;
      while(group.length<3 && step.fields[i] && step.fields[i].w===1){ group.push(step.fields[i]); i++; }
      const row = el("div",{class: group.length===3?"row3":"row2"});
      group.forEach(g=>row.appendChild(renderFieldInner(g)));
      card.appendChild(row);
    }
  }
  wrap.appendChild(card);

  const nav = el("div",{class:"nav-row"});
  nav.appendChild(el("button",{class:"btn secondary", onclick:()=>{ currentStep--; render(); window.scrollTo(0,0); }}, "\u2190 Back"));
  nav.appendChild(el("button",{class:"btn", onclick:()=>{
    if(!validateStep(step)){ return; }
    currentStep++; render(); window.scrollTo(0,0);
  }}, currentStep===STEPS.length-1 ? "Review \u2192" : "Next \u2192"));
  wrap.appendChild(nav);

  container.appendChild(wrap);
}

function wrapRow(row){ return row; }

function renderField(f){ return renderFieldInner(f); }

function renderFieldInner(f){
  const wrap = el("div",{class:"field"});
  wrap.appendChild(el("label",{for:"f_"+f.key}, f.label + (f.required?" *":"")));
  let input;
  if(f.type==="select"){
    input = el("select",{id:"f_"+f.key}, f.options.map(o=>el("option",{value:o}, o||"Select\u2026")));
    input.value = formData[f.key] || "";
    input.addEventListener("change", e=>{ formData[f.key]=e.target.value; });
  } else if(f.type==="textarea"){
    input = el("textarea",{id:"f_"+f.key});
    input.value = formData[f.key] || "";
    input.addEventListener("input", e=>{ formData[f.key]=e.target.value; });
  } else if(f.type==="checkbox"){
    const row = el("label",{class:"check-opt", style:"width:100%;"});
    const cb = el("input",{type:"checkbox", id:"f_"+f.key});
    cb.checked = !!formData[f.key];
    cb.addEventListener("change", e=>{ formData[f.key]=e.target.checked; });
    row.appendChild(cb);
    row.appendChild(document.createTextNode(" Yes"));
    wrap.innerHTML = ""; // checkbox fields render label differently
    wrap.appendChild(el("label",{}, f.label));
    wrap.appendChild(row);
    return wrap;
  } else {
    input = el("input",{type:f.type, id:"f_"+f.key, placeholder:f.placeholder||""});
    input.value = formData[f.key] || "";
    input.addEventListener("input", e=>{ formData[f.key]=e.target.value; });
  }
  wrap.appendChild(input);
  return wrap;
}

function validateStep(step){
  for(const f of step.fields){
    if(f.required && !formData[f.key]){
      alert("Please fill in: "+f.label);
      document.getElementById("f_"+f.key)?.focus();
      return false;
    }
  }
  return true;
}

/* ---------- Review ---------- */
function renderReview(container){
  const wrap = el("div",{class:"wrap"});
  wrap.appendChild(el("div",{class:"eyebrow"}, "Step "+(STEPS.length+1)+" of "+(STEPS.length+1)));
  wrap.appendChild(el("h1",{},"Review & Generate"));
  wrap.appendChild(el("p",{class:"lead"},"Here's a quick summary. If anything needs fixing, go back \u2014 otherwise, generate your paperwork below."));

  const card = el("div",{class:"card"});
  const summaryFields = ["firstName","lastName","dob","ssn","street","city","state","zip","email","phone","jobTitle"];
  STEPS.forEach(step=>{
    step.fields.forEach(f=>{
      if(formData[f.key]){
        const row = el("div",{style:"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;"},[
          el("span",{style:"color:var(--ink-soft);"}, f.label),
          el("span",{style:"font-weight:600;text-align:right;max-width:60%;"}, f.type==="checkbox" ? "Yes" : String(formData[f.key]))
        ]);
        card.appendChild(row);
      }
    });
  });
  wrap.appendChild(card);

  const nav = el("div",{class:"nav-row"});
  nav.appendChild(el("button",{class:"btn secondary", onclick:()=>{ currentStep=STEPS.length-1; render(); window.scrollTo(0,0); }}, "\u2190 Back to edit"));
  nav.appendChild(el("button",{class:"btn", onclick:()=>{ currentStep=STEPS.length+1; render(); window.scrollTo(0,0); generateAll(); }}, "Generate My Paperwork \u2192"));
  wrap.appendChild(nav);

  container.appendChild(wrap);
}

/* ---------- Generating / Done ---------- */
function renderGenerate(container){
  const wrap = el("div",{class:"wrap"});
  wrap.appendChild(el("div",{class:"eyebrow"},"Almost done"));
  wrap.appendChild(el("h1",{},"Filling out your forms\u2026"));
  wrap.appendChild(el("p",{class:"lead"},"This all happens in your browser \u2014 nothing is uploaded anywhere."));

  const card = el("div",{class:"card", id:"genStatusCard"});
  DOCS.forEach(d=>{
    card.appendChild(el("div",{class:"status-line", id:"status_"+d.id},[
      el("span",{class:"icon spin"}),
      el("span",{}, d.label)
    ]));
  });
  wrap.appendChild(card);

  const doneArea = el("div",{id:"doneArea"});
  wrap.appendChild(doneArea);

  container.appendChild(wrap);
}

function updateDocStatus(docId, status){
  const row = document.getElementById("status_"+docId);
  if(!row) return;
  row.classList.toggle("done", status==="done");
  const icon = row.querySelector(".icon");
  if(status==="done"){ icon.className="icon"; icon.textContent="\u2713"; }
  else if(status==="error"){ icon.className="icon"; icon.textContent="\u26a0"; icon.style.color="var(--pulse)"; }
  else { icon.className="icon spin"; }
}

/* =========================================================================
   PDF FILL ENGINE
========================================================================= */
async function fillDoc(doc, data){
  const bytes = await fetch(doc.file).then(r=>{
    if(!r.ok) throw new Error("Couldn't load "+doc.file);
    return r.arrayBuffer();
  });
  const pdfDoc = await PDFLib.PDFDocument.load(bytes);
  const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
  const pages = pdfDoc.getPages();

  doc.overlays.forEach(ov=>{
    const page = pages[ov.page];
    if(!page) return;
    let val = data[ov.key];
    if(ov.fmt) val = ov.fmt(val);
    if(val==null || val==="") return;
    const y = page.getHeight() - ov.bottom;
    try{
      page.drawText(String(val), { x: ov.x, y, size: ov.size||9, font, color: PDFLib.rgb(0.1,0.16,0.13) });
    }catch(e){ console.warn("Failed to draw", doc.id, ov.key, e); }
  });

  return pdfDoc.save();
}

async function generateAll(){
  const data = computeDerived(formData);
  const zip = new JSZip();
  let anyError = false;

  for(const doc of DOCS){
    updateDocStatus(doc.id, "working");
    try{
      const bytes = await fillDoc(doc, data);
      zip.file(doc.id + ".pdf", bytes);
      updateDocStatus(doc.id, "done");
    }catch(e){
      console.error(e);
      updateDocStatus(doc.id, "error");
      anyError = true;
    }
  }

  const blob = await zip.generateAsync({type:"blob"});
  const url = URL.createObjectURL(blob);
  const fname = ((formData.lastName||"employee")+"_"+(formData.firstName||"")).replace(/\s+/g,"_").toLowerCase() + "_onboarding_paperwork.zip";

  const doneArea = document.getElementById("doneArea");
  doneArea.innerHTML = "";
  doneArea.appendChild(el("div",{class:"callout"+(anyError?" warn":"")}, anyError
    ? "Most forms generated successfully, but a few had trouble \u2014 check the \u26a0 marks above. You can still download what did complete below."
    : "All done! Download your completed paperwork below, review it, and sign where indicated."));
  const dlBtn = el("a",{class:"btn", href:url, download:fname, style:"text-decoration:none;margin-top:10px;display:inline-flex;"}, "\u2b07 Download All Paperwork (.zip)");
  doneArea.appendChild(dlBtn);
  doneArea.appendChild(el("div",{style:"margin-top:16px;"}, el("button",{class:"btn secondary", onclick:()=>{
    if(confirm("Start over with a blank form?")){ formData={}; currentStep=-1; render(); window.scrollTo(0,0); }
  }}, "Start Over")));
}

/* =========================================================================
   MAIN RENDER
========================================================================= */
function render(){
  app.innerHTML = "";
  app.appendChild(topBar());
  const main = el("div",{class:"main"});
  if(currentStep === -1) renderLanding(main);
  else if(currentStep >= 0 && currentStep < STEPS.length) renderStep(main);
  else if(currentStep === STEPS.length) renderReview(main);
  else renderGenerate(main);
  app.appendChild(main);
}

render();
</script>
